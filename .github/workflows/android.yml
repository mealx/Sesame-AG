name: Release Build Custom

on:
  workflow_dispatch: # 💡 修改 1：允许你在手机上通过 Actions 页面手动一键触发，不再需要繁琐的 Tag

env:
  CI: "true"
  JAVA_DISTRIBUTION: "temurin"       # 💡 修改 2：改用开源稳定的 JDK 版本
  JAVA_VERSION: "21"                 # 💡 修改 3：升级到 JDK 21，彻底解决 GitHub 服务器上 JDK 17 的兼容性死锁 Bug
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  RELEASE_DIR: app/build/outputs/apk/release
  STAGING_DIR: app/build/outputs/apk/all

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 💡 赋予往你的 Releases 页面发包的权限

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Required Android SDK Packages
        run: |
          sdkmanager "platform-tools" "platforms;android-${{ env.ANDROID_API_LEVEL }}" "build-tools;${{ env.ANDROID_BUILD_TOOLS }}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APKs
        # 💡 调用原装编译命令，打出所有架构的 Release 正式版包
        run: ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Collect Uncompressed APKs
        # 💡 修改 4：彻底丢弃原脚本的 ZIP 压缩和加密逻辑！
        # 直接把生成的多个架构（arm64, arm32, universal等）的 .apk 复制到独立目录中
        run: |
          mkdir -p final_apks
          find app/build/outputs/apk/ -name "*.apk" -not -path "*/intermediates/*" -exec cp {} final_apks/ \;
          echo "==== 成功抓取到的兼容手机的 APK 列表 ===="
          ls -lh final_apks/

      - name: Create GitHub Release and Upload APKs Directly
        # 💡 修改 5：绕过原作者的渠道发布，直接发到你自己的 Fork 仓库的 Release 页面
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Sesame-AG 多架构直装版 v${{ github.run_number }}"
          body: |
            ## 📥 下载安装说明
            原厂正统编译，已**去除密码，去除压缩**！
            
            根据你的手机芯片下载对应的 `.apk` 直接安装：
            - **universal**: 通用版（体积稍大，如果不确定手机架构选这个 100% 成功）
            - **arm64-v8a**: 现代主流 64 位新手机
            
            ⚠️ **安装前请务必卸载手机上的旧版本。**
          draft: false
          prerelease: false
          files: final_apks/* # 💡 批量独立上传所有 .apk 文件，不打包成 zip
